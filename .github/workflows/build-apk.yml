name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -Pandroid.useAndroidX=true
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Sign APK (debug keystore)
        run: |
          APK=android/app/build/outputs/apk/release/app-release-unsigned.apk
          if [ ! -f "$APK" ]; then
            APK=android/app/build/outputs/apk/release/app-release.apk
          fi
          keytool -genkey -v -keystore /tmp/debug.keystore -alias androiddebugkey             -keyalg RSA -keysize 2048 -validity 10000             -storepass android -keypass android             -dname "CN=Android Debug,O=Android,C=US"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign             --ks /tmp/debug.keystore --ks-pass pass:android --key-pass pass:android             --ks-key-alias androiddebugkey             --out android/app/build/outputs/apk/release/hogar-tasks.apk             "$APK" || cp "$APK" android/app/build/outputs/apk/release/hogar-tasks.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hogar-tasks-apk
          path: android/app/build/outputs/apk/release/hogar-tasks.apk
          retention-days: 7
